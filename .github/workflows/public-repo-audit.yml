name: public-repo-audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/public_repo_audit.sh
      - run: cargo fmt --all --check
      - run: cargo test --workspace --all-features
      - run: bash scripts/build_cse_plus_package.sh
      - run: bash scripts/install_cse_plus_local.sh --institution-type A001 --branch-code 001 --demo-seed-i32 1001
      - run: bash scripts/prepare_three_bank_local.sh
      - run: bash scripts/run_three_bank_quick_harness.sh --iterations 10
